name: Sync upstream

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Sync upstream master
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/0niel/university-app.git || true
          git fetch upstream master --prune

      - name: Check updates
        id: updates
        run: |
          if git merge-base --is-ancestor upstream/master HEAD; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_updates=true" >> "$GITHUB_OUTPUT"

      - name: Merge upstream
        if: steps.updates.outputs.has_updates == 'true'
        run: |
          git switch -c sync/upstream-master
          if ! git merge --no-edit upstream/master; then
            git status --short > upstream-conflicts.txt
            git merge --abort || true
            gh label create upstream-sync --color 0366d6 --description "Upstream synchronization" || true
            issue_number="$(gh issue list --state open --label upstream-sync --search "Upstream sync conflict in:title" --json number --jq '.[0].number // empty')"
            if [ -n "$issue_number" ]; then
              gh issue comment "$issue_number" --body-file upstream-conflicts.txt
            else
              gh issue create --title "Upstream sync conflict" --label upstream-sync --body-file upstream-conflicts.txt
            fi
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Flutter
        if: steps.updates.outputs.has_updates == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: Validate standalone map
        if: steps.updates.outputs.has_updates == 'true'
        run: |
          cp tools/pubspec_map_web.yaml pubspec.yaml
          rm -f pubspec.lock
          flutter pub get
          dart analyze lib/map lib/main/main_map_web.dart
          flutter build web --release --target lib/main/main_map_web.dart

      - name: Push sync branch
        if: steps.updates.outputs.has_updates == 'true'
        run: |
          remote_sha="$(git ls-remote --heads origin sync/upstream-master | awk '{print $1}')"
          if [ -n "$remote_sha" ]; then
            git push --force-with-lease=refs/heads/sync/upstream-master:"$remote_sha" origin sync/upstream-master:sync/upstream-master
          else
            git push origin sync/upstream-master:sync/upstream-master
          fi

      - name: Open or update pull request
        if: steps.updates.outputs.has_updates == 'true'
        run: |
          body_file="$(mktemp)"
          cat > "$body_file" <<'BODY'
          Automated sync from `0niel/university-app:master`.

          Validation:
          - `flutter pub get` with `tools/pubspec_map_web.yaml`
          - `dart analyze lib/map lib/main/main_map_web.dart`
          - `flutter build web --release --target lib/main/main_map_web.dart`
          BODY

          pr_number="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head sync/upstream-master --json number --jq '.[0].number // empty')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --repo "$GITHUB_REPOSITORY" --title "Sync upstream master" --body-file "$body_file"
          else
            gh pr create --repo "$GITHUB_REPOSITORY" --base master --head sync/upstream-master --title "Sync upstream master" --body-file "$body_file"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
