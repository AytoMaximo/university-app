name: rtu_mirea_app
description: Standalone university map web application.
publish_to: 'none'

version: 1.6.0+145

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  app_ui:
    path: packages/app_ui
  bloc: ^9.2.0
  equatable: ^2.0.5
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.0.5
  go_router: ^17.1.0
  path_drawing: ^1.0.1
